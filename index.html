<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birdle</title>
    <meta property="og:title" content="Birdle - Guess the bird by its song" />
    <meta property="og:description" content="Listen to bird songs from Singapore and test your bird ID skills." />
    <meta property="og:url" content="https://guessbirdbysong.netlify.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Birdle - Guess the bird by its song" />
    <meta name="twitter:description" content="Listen to bird songs from Singapore and test your bird ID skills." />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Birdle</h1>
        <p class="tagline">Guess the bird by its song</p>
        <div class="score-row">
          <div class="score-item score-streak">
            <span class="score-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 23c0 0 8-4 8-12 0-4-2-6-2-6s-1 4-4 4-4-4-4-4-2 2-2 6c0 8 8 12 8 12z"/></svg>
            </span>
            <span class="score-value"><span id="streak">0</span></span>
          </div>
          <div class="score-item score-best">
            <span class="score-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            </span>
            <span class="score-value"><span id="best">0</span></span>
          </div>
        </div>
        <p id="streak-msg" class="streak-msg hidden"></p>
      </header>

      <main>
        <div id="loading" class="loading">Loading bird songs...</div>

        <div id="game" class="game hidden">
          <div class="player">
            <button id="play-btn" class="play-btn" aria-label="Play bird song">
              <svg class="icon-play" viewBox="0 0 24 24" width="48" height="48">
                <polygon points="5,3 19,12 5,21" fill="currentColor"/>
              </svg>
              <svg class="icon-pause hidden" viewBox="0 0 24 24" width="48" height="48">
                <rect x="5" y="3" width="4" height="18" fill="currentColor"/>
                <rect x="15" y="3" width="4" height="18" fill="currentColor"/>
              </svg>
            </button>
            <audio id="audio"></audio>
          </div>

          <div id="choices" class="choices"></div>

          <div id="feedback" class="feedback hidden">
            <p id="feedback-text"></p>
            <p id="location" class="location"></p>
            <div id="sono-container" class="sono-container">
              <img id="sono-img" alt="Spectrogram" />
            </div>
            <a id="xc-link" target="_blank" rel="noopener noreferrer">View on xeno-canto</a>
            <button id="next-btn" class="next-btn">Next Round</button>
          </div>
        </div>

        <div id="error" class="error hidden"></div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
