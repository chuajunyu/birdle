<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐦</text></svg>"
    />
    <title>BirdGuessr</title>
    <meta property="og:title" content="BirdGuessr - Guess the bird by its song" />
    <!-- Phase 1: static social metadata. Personalized challenge previews require a dynamic OG endpoint (Phase 2). -->
    <meta property="og:description" content="Listen to bird songs, build a streak, and challenge friends to beat your BirdGuessr high score." />
    <meta property="og:url" content="https://guessbirdbysong.netlify.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BirdGuessr - Guess the bird by its song" />
    <meta name="twitter:description" content="Listen to bird songs, build a streak, and challenge friends to beat your BirdGuessr high score." />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>BirdGuessr</h1>
        <p class="tagline">Guess the bird by its song</p>
        <div class="score-row">
          <div class="score-item score-streak">
            <span class="score-emoji" aria-hidden="true">🔥</span>
            <span class="score-label">Streak</span>
            <span class="score-value" id="streak">0</span>
          </div>
          <div class="score-item score-best">
            <span class="score-emoji" aria-hidden="true">🏆</span>
            <span class="score-label">Best</span>
            <span class="score-value" id="best">0</span>
          </div>
        </div>
        <p id="streak-msg" class="streak-msg hidden"></p>
      </header>

      <main>
        <div id="loading" class="loading">Loading bird songs...</div>

        <div id="game" class="game hidden">
          <div id="challenge-banner" class="challenge-banner hidden" role="status" aria-live="polite">
            <p id="challenge-banner-text"></p>
          </div>

          <div class="player">
            <button
              type="button"
              id="player-unified"
              class="player-unified"
              aria-label="Play bird song"
            >
              <span
                id="player-unified-fill"
                class="player-unified-fill"
                aria-hidden="true"
              ></span>
              <span class="player-unified-inner">
                <span class="player-unified-icon-wrap" aria-hidden="true">
                  <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22">
                    <polygon points="5,3 19,12 5,21" fill="currentColor"/>
                  </svg>
                  <svg class="icon-pause hidden" viewBox="0 0 24 24" width="22" height="22">
                    <rect x="5" y="3" width="4" height="18" fill="currentColor"/>
                    <rect x="15" y="3" width="4" height="18" fill="currentColor"/>
                  </svg>
                </span>
                <span id="player-time" class="player-unified-time">0:00 / --:--</span>
              </span>
            </button>
            <audio id="audio"></audio>
          </div>

          <div id="choices" class="choices"></div>

          <div id="feedback" class="feedback hidden">
            <p id="feedback-text"></p>
            <div id="species-image-wrap" class="species-image-wrap hidden">
              <img id="species-image" alt="" />
            </div>
            <p id="image-credit" class="recording-meta hidden"></p>
            <p id="species-more-photos" class="recording-meta hidden"></p>
            <p id="sound-type-summary" class="recording-meta hidden"></p>
            <p id="location" class="location hidden"></p>
            <p id="recording-datetime-summary" class="recording-meta hidden"></p>
            <div id="sono-container" class="sono-container hidden">
              <img id="sono-img" alt="Medium spectrogram" />
            </div>
            <p id="recording-credit" class="recording-meta hidden"></p>
            <button id="next-btn" class="next-btn">Next Round</button>
          </div>

          <div id="highscore-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="highscore-title">
            <div class="modal-card">
              <h2 id="highscore-title">New high score!</h2>
              <p id="highscore-subtitle" class="modal-subtitle"></p>
              <label class="field-label" for="share-name">Your name (optional)</label>
              <input id="share-name" class="modal-input" type="text" maxlength="40" placeholder="a birder" />
              <label class="field-label" for="share-link">Shareable link</label>
              <input id="share-link" class="modal-input" type="text" readonly />
              <p id="share-preview" class="share-preview"></p>
              <div class="modal-actions">
                <button id="copy-share-btn" type="button" class="next-btn">Copy Link</button>
                <button id="native-share-btn" type="button" class="next-btn">Share</button>
                <button id="close-highscore-btn" type="button" class="next-btn modal-close">Close</button>
              </div>
              <p id="share-status" class="share-status hidden" role="status" aria-live="polite"></p>
            </div>
          </div>
        </div>

        <div id="error" class="error hidden"></div>
      </main>

      <footer class="site-footer">
        <p>
          Bird photos from
          <a
            href="https://www.inaturalist.org/projects/nst2007-2026-bird-race"
            target="_blank"
            rel="noopener noreferrer"
            >NST Bird Race (2007–2026)</a>
          on iNaturalist.
        </p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
